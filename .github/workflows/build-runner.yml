name: Build runner image

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

env:
    imageName: ubuntu-machine
    arch: "linux/arm64"

jobs:
  build:
    concurrency:
      group: ubuntu-machine-build
      cancel-in-progress: true
    runs-on:
      group: permanent-runners
      labels:
        - macOS
    steps:
        - name: Checkout repository
          uses: actions/checkout@v6

        - name: Lås opp nøkkelring
          run: security -v unlock-keychain -p ${{secrets.MACOS_KC_PASS}} ~/Library/Keychains/login.keychain-db

        - name: Login to GitHub Container Registry
          uses: docker/login-action@v4
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
        
        - name: Login to Docker Hub
          uses: docker/login-action@v4
          with:
            registry: docker.io
            username: ${{ vars.DOCKER_USER }}
            password: ${{ secrets.DOCKER_TOKEN }}
        
        - name: Setter metadata for Docker
          id: meta
          uses: docker/metadata-action@v6
          with:
            # list of Docker images to use as base name for tags
            images: |
              ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            # generate Docker tags based on the following events/attributes
            tags: |
              type=raw,value=${env.imageName}
              # Kort SHA > 'sha-xxxxxx'
              type=sha,prefix=${{ env.imageName }}-,format=short

        - name: Oppsett av Docker Buildx
          uses: docker/setup-buildx-action@v4
          with:
            name: ${{ env.imageName }}-builder
            driver: docker-container

        - name: Bygg og push
          uses: docker/build-push-action@v7
          with:
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            file: ubuntu-machine.Dockerfile
            context: .
            platforms: ${{ env.arch }}
            cache-from: type=gha
            cache-to: type=gha,mode=max
