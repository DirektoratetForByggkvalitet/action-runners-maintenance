name: 'Build runner image'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

env:
    imageName: ubuntu-runner 

jobs:
  build:
    concurrency:
      group: action-runner-${{ github.ref_name }}-build
      cancel-in-progress: true
    runs-on:
      group: permanent-runners
      labels:
        - macOS
    steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Setup container CLI
          run: |
            brew install container
            printf 'y\n' | container system start

        - name: Lås opp nøkkelring
          run: security -v unlock-keychain -p ${{secrets.MACOS_KC_PASS}} ~/Library/Keychains/login.keychain-db

        - name: Docker login to ghcr.io
          uses: docker/login-action@v4
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build image
          run: |           
            container build -t local/${{ env.imageName }}:latest -f ${{ env.imageName }}.Dockerfile .
            container image tag local/${{ env.imageName }}:latest ghcr.io/${{ github.repository }}/${{ env.imageName }}:latest
            container image tag local/${{ env.imageName }}:latest ghcr.io/${{ github.repository }}/${{ env.imageName }}:${{ github.sha }}
        - name: Push image
          run: |
            container image push ghcr.io/${{ github.repository }}/${{ env.imageName }}:latest
            container image push ghcr.io/${{ github.repository }}/${{ env.imageName }}:${{ github.sha }}
            container image prune --all